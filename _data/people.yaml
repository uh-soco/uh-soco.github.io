- name: Anton Berg
  image: /assets/images/people/anton-berg.webp
  description: Anton Berg is a doctoral researcher at the Helsinki Institute of Humanities and Social Sciences under the University of Helsinki. He is also part of the Mediatized Religious Populism project (MERELPO), funded by the Academy of Finland. Berg examines the connections between religion and datafication — especially phenomena such as religious populism on hybrid media platforms. His background is in religious studies, digital humanities and cognitive science. At Helsinki Social Computing Group, Berg examined the validity of computational image analysis tools.
  alumni: false
  orcid: 0000-0001-7143-762X
  focus_areas:
    - dcm
- name: Felix Epp
  image: /assets/images/people/felix-epp.jpg
  description: Felix Anand Epp is a postdoctoral researcher in the Digital Ideologies project with a background in design and human-computer interaction. His interdisciplinary research revolves around interactive digital technologies and how they shape social practices. He primarily uses qualitative and designerly methods, like research through design, ethnography and codesign, to explore embodied experiences and technology-mediated interactions in people's lives. Felix's doctoral research investigated wearable technologies for augmenting appearance and how they shape our clothing and social practices. At Aalto University, he also develops methods that incorporate future thinking in design and technology innovation.
  alumni: false
  orcid: 0000-0001-6252-7244
  focus_areas:
    - digital-society
- name: Jesse Haapoja
  image: ''
  description: Jesse Haapoja is a postdoctoral researcher in the Digital Ideologies -project with a background in social psycholgy. Jesse has a broad interest towards questions arising when individuals are increasingly becoming users of different types of digital services and software and these user roles become enmeshed with their daily lives. Working mainly with qualitative methods, he has focused in his work in different types of encounters humans have with algorithmic systems. His PhD dissertation used game metaphor as an analytical lens to study said encounters.
  alumni: false
  orcid: 0000-0001-6877-7957
  focus_areas:
    - digital-society
- name: Matti Nelimarkka
  image: '/assets/images/people/matti-nelimarkka.webp'
  description: Matti Nelimarkka is a political scientist with a background in computer science or a computer scientist who knows a bit how society works. His scholarly work focuses on digital and computational methods in social sciences, especially looking at the practices, reliability, and validity of these in social science. He applies digital, computational and increasingly design-based methods in political science and democracy related themes.
  alumni: false
  orcid: 0000-0001-9867-692X
