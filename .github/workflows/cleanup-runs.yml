name: Clean up old workflow runs

# Deletes workflow run history (across all workflows in this repo) older
# than 7 days, so the Actions tab doesn't accumulate runs indefinitely.
# Uses actions/github-script (an official GitHub action) to call the REST
# API directly, rather than a third-party marketplace action, to avoid
# adding an extra supply-chain dependency for something this small.

on:
  schedule:
    - cron: "0 5 * * 0" # weekly, Sunday 05:00 UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs older than 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const cutoff = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const run of runs) {
              if (run.status === "in_progress" || run.status === "queued") {
                continue; // never delete a run that's still active
              }
              if (new Date(run.created_at) >= cutoff) {
                continue; // not old enough yet
              }
              console.log(`Deleting run ${run.id} (${run.name}, created ${run.created_at})`);
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              } catch (err) {
                console.log(`  warning: could not delete run ${run.id}: ${err.message}`);
              }
            }
