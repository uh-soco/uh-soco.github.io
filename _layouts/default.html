<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  {% assign ds_base = site.ds_cdn_base | append: "/" | append: site.ds_version %}
  <link rel="stylesheet" href="{{ ds_base }}/component-library/component-library.css">
  <link rel="stylesheet" href="{{ ds_base }}/fonts/fonts.css">
  <script type="module" src="{{ ds_base }}/esm/component-library.js"></script>

  <link rel="stylesheet" href="{{ '/assets/css/layout.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }} publications" href="{{ '/feed/publications.xml' | relative_url }}">
</head>
<body>
  <ds-store ds-language="en"></ds-store>
  {% include nav.html %}
  <main class="wrapper">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/load-more.js' | relative_url }}" defer></script>
</body>
</html>
